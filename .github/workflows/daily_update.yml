name: Daily GPU Price Collection

on:
  schedule:
    # Run daily at 9:00 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  collect-data:
    runs-on: ubuntu-latest

    permissions:
      id-token: write      # lets GitHub mint the OIDC JWT for AWS
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Parquet emission needs pyarrow; HF sync needs huggingface_hub.
        # Neither is in the runtime requirements.
        pip install pyarrow huggingface_hub

    - name: Create necessary directories
      run: mkdir -p data data/parquet

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Collect GPU prices
      # collect.py exits nonzero on zero records, which fails the job and
      # skips the upload step (preventing an empty publish).
      run: |
        echo "Collecting GPU prices from gpuhunt..."
        python3 collect.py -v --stats
        echo "Collection complete!"

    - name: Emit latest snapshot as Parquet
      run: |
        python3 scripts/emit_latest_parquet.py \
          --db data/gpu_prices.db \
          --out data/parquet

    - name: Sync Parquet snapshot to S3
      if: success()
      # --size-only avoids re-uploading existing snapshot files; only the
      # newly-emitted file is pushed.
      run: |
        aws s3 sync data/parquet/prices/ \
          s3://hubbard-gpu-price-data/prices/ \
          --size-only

    - name: Sync Parquet snapshot to Hugging Face
      if: success() && env.HF_TOKEN != ''
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      # Idempotent: HF dedupes content-addressed uploads, so repeated runs
      # only push the new snapshot file.
      run: |
        python3 scripts/sync_to_huggingface.py \
          --src data/parquet/prices
