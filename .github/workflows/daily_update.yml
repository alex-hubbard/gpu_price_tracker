name: Daily GPU Price Collection

on:
  schedule:
    # Run daily at 9:00 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  collect-data:
    runs-on: ubuntu-latest

    permissions:
      id-token: write      # lets GitHub mint the OIDC JWT for AWS
      contents: write        # only if this job still runs `git push` (yours does)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true  # Enable Git LFS
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data
    
    - name: Collect GPU prices
      run: |
        echo "Collecting GPU prices from gpuhunt..."
        python3 collect.py -v --stats
        echo "Collection complete!"

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1
    
    - name: Upload database to S3
      if: success()
      run: |
        aws s3 cp data/gpu_prices.db "s3://hubbard-gpu-price-data/gpu_prices.db"
    
    - name: Clean up old logs (keep last 30 days)
      if: success()
      run: |
        find data/ -name "*.log" -type f -mtime +30 -delete 2>/dev/null || true
